# Dota 2 GSI Listener Configuration
server:
  host: "127.0.0.1"   # 监听地址 (127.0.0.1 = 仅本机)
  port: 3000            # 监听端口 (需与 Dota 2 GSI 配置中的 uri 一致)

logging:
  # 日志输出目录
  log_dir: "./logs"
  # 是否为每局游戏创建原始 GSI JSONL 日志
  session_file: true

# 视野追踪（基于 minimap 数据对比）
vision:
  # 是否启用敌方视野检测
  enabled: true

# Windows SAPI 语音播报
tts:
  # 语速，范围 -10 到 10
  rate: 4
  # full 战略播报的目标最长秒数
  full_max_seconds: 25
  # 本地时长预算估算（每秒朗读字符数，含标点间隔）
  estimated_chars_per_second: 7
  # PowerShell 进程启动与收尾缓冲秒数
  timeout_buffer_seconds: 8

# AI 教练建议（OpenAI-compatible API）
ai_advisor:
  # 是否启用 AI 教练
  enabled: true
  # API Key（必填，支持 DeepSeek / Qwen / Doubao 等兼容接口）
  api_key: ""
  # OpenAI-compatible API base URL. Examples:
  # DeepSeek: https://api.deepseek.com
  # Qwen/DashScope: https://dashscope.aliyuncs.com/compatible-mode/v1
  # Doubao/Volcengine Ark: https://ark.cn-beijing.volces.com/api/v3
  base_url: "https://api.deepseek.com"
  # 模型名称
  model: "deepseek-v4-pro"
  # 查询间隔（游戏内分钟数）
  interval_minutes: 1
  # 最大回复 token 数
  max_tokens: 500
  # 创造性参数
  temperature: 0.2
  # 系统提示词文件路径（优先级高于 system_prompt 字段）
  system_prompt_file: "./AIPromt.md"
  # 系统提示词（仅 system_prompt_file 不存在时生效）
  system_prompt: "你是一个专业的 Dota 2 教练。直接给出建议，不要解释。"
  # 请求超时秒数
  timeout_seconds: 30
  # 厂商特定请求字段。Doubao / Qwen 留空 {}；DeepSeek 需关闭内置思考模式
  extra_body:
    thinking:
      type: "disabled"
  # 提示词日志目录
  prompt_log_dir: "./logs"
  # Dota 2 机制本体，用于动态补充敌方特性与反制候选
  ontology:
    enabled: true
    path: "./Dota2MechanismOntology"
    min_counter_strength: 70
    max_traits_per_hero: 3
    max_counters_per_hero: 2
    max_context_chars: 1800
